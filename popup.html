<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leer hilo vBulletin (beta 0.1.8)</title>
    <style>
      body {
        font-family: system-ui, Arial, sans-serif;
        margin: 12px;
        min-width: 220px;
        color: #111;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px 0;
      }
      button {
        width: 100%;
        margin: 6px 0;
        padding: 8px 10px;
        border: 0;
        border-radius: 6px;
        background: #2b6cb0;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      button.secondary {
        background: #4a5568;
      }
      .status {
        font-size: 12px;
        color: #444;
        margin-top: 8px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Leer hilo vBulletin (beta 0.1.7)</h1>
    <button id="play">Leer posts</button>
    <button id="stop" class="secondary">Detener</button>
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
