<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leer hilo vBulletin (beta 0.1.8)</title>
    <style>
      body {
        font-family: system-ui, Arial, sans-serif;
        margin: 12px;
        min-width: 220px;
        color: #111;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px 0;
      }
      .option {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        margin: 8px 0;
      }
      button {
        width: 100%;
        margin: 6px 0;
        padding: 8px 10px;
        border: 0;
        border-radius: 6px;
        background: #2b6cb0;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      button.secondary {
        background: #4a5568;
      }
      button:disabled {
        background: #a0aec0;
        color: #f7fafc;
        cursor: not-allowed;
        opacity: 0.8;
      }
      label.option input:disabled + span {
        color: #9aa0a6;
      }
      .status {
        font-size: 12px;
        color: #444;
        margin-top: 8px;
        min-height: 16px;
      }
      .status.error {
        color: #b00020;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>Leer hilo vBulletin (beta 0.1.7)</h1>
    <label class="option">
      <input type="checkbox" id="autoNext" />
      <span>Pasar de página automáticamente</span>
    </label>
    <button id="play">Leer posts del hilo (F8)</button>
    <button id="next" class="secondary">Saltar al siguiente post (F4)</button>
    <button id="stop" class="secondary">Detener lectura (F8)</button>
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
